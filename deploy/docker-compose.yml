# ============================================================
#  WorkNest AI大数据分析平台 — Docker Compose
#  ============================================================
#  访问: http://192.168.146.128 (工作台)
#         http://192.168.146.128/launcher.html (启动器)
#  ============================================================

version: "3.9"

services:
  # ==================== Nginx 前端 ====================
  nginx:
    image: nginx:alpine
    container_name: zentao-nginx
    ports:
      - "80:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== FastAPI 应用后端 ====================
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile
    container_name: zentao-fastapi
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: zentao
      DB_PASSWORD: zentao123
      DB_NAME: zentao
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend
      - uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== MySQL 主数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: zentao-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: zentao
      MYSQL_USER: zentao
      MYSQL_PASSWORD: zentao123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== PostgreSQL 数据仓库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: ai_platform_postgres
    environment:
      POSTGRES_DB: ai_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== Apache Kafka 消息队列 (KRaft模式 — 无需Zookeeper) ====================
  kafka:
    image: apache/kafka:3.7.0
    container_name: ai_platform_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwRTENDOWQ0RTk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== Apache Spark 批处理 ====================
  spark-master:
    image: apache/spark:3.5.0
    container_name: ai_platform_spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - spark_data:/opt/spark/work
    networks:
      - worknest_net
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0
    container_name: ai_platform_spark_worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 1G
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8081"
    networks:
      - worknest_net
    restart: unless-stopped

  # ==================== Apache Flink 流计算 ====================
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: ai_platform_flink_jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 2
        jobmanager.memory.process.size: 1600m
    ports:
      - "8083:8081"
    networks:
      - worknest_net
    restart: unless-stopped

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: ai_platform_flink_taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1728m
    networks:
      - worknest_net
    restart: unless-stopped

# ==================== 网络 ====================
networks:
  worknest_net:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  mysql_data:
  postgres_data:
  redis_data:
  spark_data:
  uploads:
