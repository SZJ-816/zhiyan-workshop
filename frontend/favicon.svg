<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="url(#bg)"/>
  
  <!-- Subtle highlight -->
  <ellipse cx="24" cy="16" rx="16" ry="7" fill="url(#glow)"/>
  
  <!-- Hexagonal innovation symbol -->
  <polygon points="32,16 44,24 44,40 32,48 20,40 20,24" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linejoin="round" opacity="0.3"/>
  
  <!-- Central lightbulb / innovation node -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  <circle cx="32" cy="32" r="3" fill="#FFFFFF"/>
  
  <!-- Connection lines to vertices -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="44" y2="24" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="44" y2="40" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="32" y2="48" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="20" y2="40" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="20" y2="24" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Vertex nodes -->
  <circle cx="32" cy="16" r="2.5" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="44" cy="24" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="44" cy="40" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="32" cy="48" r="2.5" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="20" cy="40" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="20" cy="24" r="2" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Innovation spark at top -->
  <circle cx="32" cy="10" r="2" fill="#FDE68A" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
