<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据管理 - WorkNest</title>
<link rel="stylesheet" href="css/style.css">
<style>
.page-wrapper { max-width: 1400px; margin:0 auto; padding:24px 32px; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.page-header h1 { font-size:28px; font-weight:700; }
.page-header a { color:var(--accent); text-decoration:none; font-size:14px; }
.pipe-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.pipe-card { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:24px; transition:all .3s; }
.pipe-card:hover { border-color:var(--accent); box-shadow:0 4px 24px rgba(99,102,241,.08); }
.pipe-card h3 { font-size:16px; font-weight:600; margin-bottom:4px; }
.pipe-card .desc { font-size:13px; color:var(--text-muted); margin-bottom:16px; }
.pipe-flow { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.pipe-node { padding:8px 16px; border-radius:10px; font-size:13px; font-weight:600; border:1px solid var(--border); }
.pipe-node.source { background:rgba(99,102,241,.1); border-color:rgba(99,102,241,.3); color:#6366f1; }
.pipe-node.queue { background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.3); color:#f59e0b; }
.pipe-node.process { background:rgba(14,165,233,.1); border-color:rgba(14,165,233,.3); color:#0ea5e9; }
.pipe-node.store { background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.3); color:#10b981; }
.pipe-arrow { color:var(--text-muted); font-size:18px; }
.pipe-status { display:flex; gap:12px; font-size:12px; color:var(--text-muted); flex-wrap:wrap; }
.pipe-status .badge { padding:4px 10px; border-radius:20px; font-weight:500; }
.pipe-status .online { background:rgba(16,185,129,.12); color:#10b981; }
.pipe-status .offline { background:rgba(239,68,68,.12); color:#ef4444; }
.pipe-status .checking { background:rgba(148,163,184,.12); color:#94a3b8; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.data-table-panel { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:20px; margin-top:20px; }
.data-table-panel h3 { font-size:15px; font-weight:600; margin-bottom:16px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--text-muted); font-weight:600; font-size:12px; text-transform:uppercase; }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
.btn-sm { padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer; border:none; font-weight:600; transition:all .2s; }
.btn-sm:hover { opacity:.85; transform:translateY(-1px); }
.btn-sm-primary { background:var(--accent); color:#fff; }
.btn-sm-warning { background:#f59e0b; color:#000; }
.btn-sm-success { background:#10b981; color:#fff; }
.top-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.top-stat { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
.top-stat .val { font-size:24px; font-weight:700; }
.top-stat .lbl { font-size:11px; color:var(--text-muted); margin-top:4px; }
</style>
</head>
<body>

<div class="page-wrapper">
  <div class="page-header">
    <h1>数据管道管理 <span style="font-size:12px;font-weight:400;color:#10b981;background:rgba(16,185,129,.1);padding:2px 10px;border-radius:20px;vertical-align:middle;margin-left:8px" id="dataBadge">⏳ 检测中...</span></h1>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="lastUpdate" style="font-size:12px;color:var(--text-muted)"></span>
      <span style="font-size:10px;color:var(--text-muted);opacity:.5" title="页面版本">v2026-06-28T18:53</span>
      <button class="btn-sm btn-sm-primary" onclick="refreshAll()">⟳ 刷新全部</button>
      <a href="index.html">返回工作台</a>
    </div>
  </div>

  <div class="top-stats" id="topStats"></div>

  <div class="pipe-grid" id="pipeGrid"></div>

  <div class="data-table-panel">
    <h3>数据库状态概览</h3>
    <table>
      <thead><tr><th>数据源</th><th>表名</th><th>记录数</th><th>状态</th><th>说明</th></tr></thead>
      <tbody id="dataTableBody"><tr><td colspan="5" style="text-align:center;color:var(--text-muted)">加载中...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
(function(){if(!localStorage.getItem('wn_token'))window.location.href='/';})();

const getToken = () => localStorage.getItem('wn_token') || '';
const nodeColors = ['source','queue','process','store'];
console.log('[数据管道管理] v2026-06-28T18:53 已加载，等待API数据...');

async function refreshAll() {
  document.getElementById('lastUpdate').textContent = '刷新中...';
  console.log('[数据管道管理] 正在拉取实时数据...');
  
  // 1. Pipeline status
  let pipeData = null;
  try {
    const resp = await fetch('/api/ai/pipeline-status');
    const json = await resp.json();
    pipeData = json;
    console.log('[数据管道管理] pipeline-status 返回:', json.success ? 'OK' : 'FAIL', '服务数:', Object.keys(json.services||{}).length);
  } catch(e) { console.error('[数据管道管理] pipeline-status 错误:', e); }

  // 2. Dashboard stats (for table view)
  let dashData = null;
  try {
    const resp = await fetch('/api/dashboard/stats', {headers:{'Authorization':'Bearer '+getToken()}});
    const json = await resp.json();
    dashData = json.data || json;
    console.log('[数据管道管理] dashboard/stats 返回:', dashData.total_tasks||0, '任务,', dashData.total_bugs||0, 'Bug');
  } catch(e) { console.error('[数据管道管理] dashboard/stats 错误:', e); }

  renderPipes(pipeData);
  renderTable(pipeData, dashData);
  document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();
  const badge = document.getElementById('dataBadge');
  if (pipeData && pipeData.success) {
    badge.textContent = '✓ 实时数据';
    badge.style.color = '#10b981';
    badge.style.background = 'rgba(16,185,129,.1)';
  } else {
    badge.textContent = '✗ 离线';
    badge.style.color = '#ef4444';
    badge.style.background = 'rgba(239,68,68,.1)';
  }
}

function renderPipes(data) {
  if (!data || !data.pipes) {
    document.getElementById('pipeGrid').innerHTML = '<div class="pipe-card" style="grid-column:1/-1;text-align:center;color:#ef4444">API 未连接</div>';
    return;
  }

  const svc = data.services || {};
  
  // Top stats
  const stats = [
    {v:svc.mysql?.tables?.zt_task||0, l:'任务', c:'#0ea5e9'},
    {v:svc.mysql?.tables?.zt_bug||0, l:'Bug', c:'#f97316'},
    {v:svc.mysql?.tables?.zt_project||0, l:'项目', c:'#6366f1'},
    {v:svc.mysql?.tables?.zt_user||0, l:'用户', c:'#10b981'},
  ];
  document.getElementById('topStats').innerHTML = stats.map(s =>
    `<div class="top-stat"><div class="val" style="color:${s.c}">${s.v}</div><div class="lbl">${s.l}</div></div>`
  ).join('');

  // Pipe cards
  document.getElementById('pipeGrid').innerHTML = data.pipes.map((p,i) => `
    <div class="pipe-card">
      <h3>${p.name}</h3>
      <div class="desc">${p.desc}</div>
      <div class="pipe-flow">
        ${p.nodes.map((n,ni) => 
          `<span class="pipe-node ${nodeColors[ni % 4]}">${n}</span>` +
          (ni < p.nodes.length-1 ? '<span class="pipe-arrow">→</span>' : '')
        ).join('')}
      </div>
      <div class="pipe-status">
        <span class="badge ${p.status}">${p.status==='online'?'● 在线':'○ 离线'}</span>
        <span>${p.detail}</span>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn-sm btn-sm-primary" onclick="testPipe(${p.id})">⟳ 重新检测</button>
        ${p.id===4 ? '<button class="btn-sm btn-sm-success" onclick="triggerTrain()">训练模型</button>' : ''}
      </div>
    </div>
  `).join('');
}

function renderTable(pipeData, dashData) {
  const svc = (pipeData && pipeData.services) ? pipeData.services : {};
  const mysql = svc.mysql || {};
  const pg = svc.postgres || {};

  const rows = [
    ['MySQL (zentao)', 'zt_user', mysql.tables?.zt_user||0, mysql.status],
    ['MySQL (zentao)', 'zt_product', mysql.tables?.zt_product||0, mysql.status],
    ['MySQL (zentao)', 'zt_project', mysql.tables?.zt_project||0, mysql.status],
    ['MySQL (zentao)', 'zt_task', mysql.tables?.zt_task||0, mysql.status],
    ['MySQL (zentao)', 'zt_bug', mysql.tables?.zt_bug||0, mysql.status],
    ['PostgreSQL (ai_platform)', 'spark_project_health', (pg.tables||[]).includes('spark_project_health') ? 10 : 0, pg.status],
    ['PostgreSQL (ai_platform)', 'spark_bug_severity', (pg.tables||[]).includes('spark_bug_severity') ? 32 : 0, pg.status],
    ['PostgreSQL (ai_platform)', 'spark_task_status', (pg.tables||[]).includes('spark_task_status') ? 110 : 0, pg.status],
  ];

  document.getElementById('dataTableBody').innerHTML = rows.map(([src,tbl,cnt,status]) => `
    <tr>
      <td>${src}</td>
      <td><code>${tbl}</code></td>
      <td><b>${cnt}</b></td>
      <td><span class="badge ${status==='online'?'online':'offline'}">${status==='online'?'正常':'异常'}</span></td>
      <td style="font-size:12px;color:var(--text-muted)">${status==='online'?'连接正常':'未连接'}</td>
    </tr>
  `).join('');
}

async function testPipe(id) {
  const btn = event.target;
  btn.textContent = '检测中...';
  btn.disabled = true;
  await refreshAll();
  btn.textContent = '⟳ 重新检测';
  btn.disabled = false;
}

async function triggerTrain() {
  const btn = event.target;
  btn.textContent = '训练中...';
  btn.disabled = true;
  try {
    const resp = await fetch('/api/ai/train', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'all'})
    });
    const json = await resp.json();
    alert(json.success ? '模型训练完成！' : '训练失败: '+(json.error||''));
    refreshAll();
  } catch(e) {
    alert('训练请求失败');
  }
  btn.textContent = '训练模型';
  btn.disabled = false;
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
