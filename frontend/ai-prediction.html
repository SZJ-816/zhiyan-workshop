<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI预测 - WorkNest</title>
<link rel="stylesheet" href="css/style.css">
<style>
.page-wrapper { max-width: 1400px; margin:0 auto; padding:24px 32px; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.page-header h1 { font-size:28px; font-weight:700; }
.page-header a { color:var(--accent); text-decoration:none; font-size:14px; }
.panels-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.panel { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:24px; }
.panel h3 { font-size:16px; font-weight:600; margin-bottom:16px; }
.form-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:4px; flex:1; }
.form-group label { font-size:12px; color:var(--text-muted); font-weight:500; }
.form-group input, .form-group select { padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:14px; }
.btn { padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.9; transform:translateY(-1px); }
.btn-success { background:#10b981; color:#fff; }
.result-box { margin-top:16px; padding:16px; background:var(--bg); border-radius:12px; border:1px solid var(--border); }
.result-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; }
.result-value { font-size:28px; font-weight:700; color:var(--accent); margin-top:4px; }
.result-detail { font-size:13px; color:var(--text-muted); margin-top:6px; }
.badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-fatal { background:#ef4444; color:#fff; }
.badge-serious { background:#f97316; color:#fff; }
.badge-normal { background:#eab308; color:#000; }
.badge-minor { background:#22c55e; color:#fff; }
.badge-low { background:#22c55e; color:#fff; }
.badge-medium { background:#eab308; color:#000; }
.badge-high { background:#f97316; color:#fff; }
.badge-critical { background:#ef4444; color:#fff; }
.factors { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }
.factor { padding:4px 10px; background:var(--card-bg); border-radius:20px; font-size:12px; color:var(--text-muted); border:1px solid var(--border); }
.model-info { margin-top:20px; padding:16px; border-radius:12px; background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(14,165,233,.06)); border:1px solid rgba(14,165,233,.15); }
.model-info .status { font-size:13px; }
</style>
</head>
<body>

<div class="page-wrapper">
  <div class="page-header">
    <h1>AI预测引擎</h1>
    <a href="index.html">返回工作台</a>
  </div>

  <!-- 模型状态 -->
  <div class="model-info" id="modelInfo">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <b style="color:#7c3aed">模型状态</b>
        <div class="status" id="modelStatus">加载中...</div>
      </div>
      <button class="btn btn-primary" onclick="triggerTraining()" id="trainBtn">重新训练模型</button>
    </div>
  </div>

  <div class="panels-grid">
    <!-- Bug 严重度预测 -->
    <div class="panel">
      <h3>Bug 严重度预测</h3>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">基于 NLP + RandomForest 分析 Bug 标题，预测严重级别</p>
      <div class="form-row">
        <div class="form-group" style="flex:3">
          <label>Bug 标题</label>
          <input type="text" id="bugTitle" placeholder="例如: 登录页点击按钮后白屏3秒无响应" value="">
        </div>
        <button class="btn btn-primary" onclick="predictBug()" style="flex:0">预测</button>
      </div>
      <div id="bugResult" class="result-box" style="display:none">
        <div class="result-label">预测严重度</div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
          <span id="bugSeverityBadge" class="badge"></span>
          <span style="font-size:14px;color:var(--text-muted)">置信度: <b id="bugConfidence"></b></span>
        </div>
        <div id="bugExplanation" style="margin-top:12px;font-size:13px;color:var(--text-muted);line-height:1.6"></div>
      </div>
      <!-- 快捷示例 -->
      <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text-muted)">示例: </span>
        <a href="javascript:fillBug('登录页数据全部丢失用户无法恢复')" style="font-size:11px;color:var(--accent)">数据丢失</a>
        <a href="javascript:fillBug('图表在Safari浏览器上显示白屏')" style="font-size:11px;color:var(--accent)">白屏</a>
        <a href="javascript:fillBug('页面文案有个错别字')" style="font-size:11px;color:var(--accent)">错别字</a>
        <a href="javascript:fillBug('审批接口响应超时超过5秒')" style="font-size:11px;color:var(--accent)">超时</a>
      </div>
    </div>

    <!-- 任务耗时预测 -->
    <div class="panel">
      <h3>任务完成耗时预测</h3>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">基于历史数据，预测任务实际耗时 (GradientBoosting 回归)</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group">
          <label>预估工时 (小时)</label>
          <input type="number" id="taskEstimate" value="16" min="1">
        </div>
        <div class="form-group">
          <label>优先级</label>
          <select id="taskPriority">
            <option value="high">高</option>
            <option value="medium" selected>中</option>
            <option value="low">低</option>
            <option value="urgent">紧急</option>
          </select>
        </div>
        <div class="form-group">
          <label>项目 ID</label>
          <input type="number" id="taskProjectId" value="1">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <button class="btn btn-success" onclick="predictTask()" style="width:100%">预测耗时</button>
        </div>
      </div>
      <div id="taskResult" class="result-box" style="display:none">
        <div class="result-label">预测实际耗时</div>
        <div class="result-value" id="predictedHours">--</div>
        <div class="result-detail">
          预估: <b id="taskEstimateDisplay"></b>h &nbsp;|&nbsp;
          范围: <b id="taskRange"></b> &nbsp;|&nbsp;
          方法: <b id="taskMethod"></b>
        </div>
      </div>
    </div>
  </div>

  <!-- 项目风险评估 -->
  <div class="panel">
    <h3>项目风险评估</h3>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">基于任务完成率、Bug解决率等多维特征预测项目风险等级</p>
    <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px">
      <div class="form-group">
        <label>项目 ID (从项目管理页面获取)</label>
        <input type="number" id="projectId" value="1" min="1" style="width:120px">
      </div>
      <button class="btn btn-primary" onclick="predictProject()">分析风险</button>
    </div>
    <div id="projectResult" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="result-box" style="text-align:center">
          <div class="result-label">风险等级</div>
          <div style="margin-top:8px"><span id="riskBadge" class="badge"></span></div>
        </div>
        <div class="result-box" style="text-align:center">
          <div class="result-label">健康分</div>
          <div class="result-value" style="font-size:24px" id="healthScore">--</div>
        </div>
        <div class="result-box" style="text-align:center">
          <div class="result-label">任务完成率</div>
          <div class="result-value" style="font-size:24px" id="completionRate">--</div>
        </div>
        <div class="result-box" style="text-align:center">
          <div class="result-label">Bug解决率</div>
          <div class="result-value" style="font-size:24px" id="bugResolveRate">--</div>
        </div>
      </div>
      <div id="riskFactors" class="factors"></div>
      <div id="projectName" style="font-size:14px;color:var(--text);margin-top:8px"></div>
    </div>
  </div>
</div>

<script>
(function(){if(!localStorage.getItem('wn_token'))window.location.href='/';})();

const API = '/api/ai';
const getToken = () => localStorage.getItem('wn_token') || '';

async function loadModelInfo() {
  try {
    const resp = await fetch(API + '/model-info');
    const data = await resp.json();
    document.getElementById('modelStatus').innerHTML = 
      `模型: <b>${data.current_model}</b> | 已加载: <b>${(data.models_loaded||[]).join(', ')||'无'}</b> | 预测次数: ${data.prediction_count}`;
  } catch(e) {
    document.getElementById('modelStatus').textContent = 'API未连接 - 请检查后端服务';
  }
}

async function predictBug() {
  const title = document.getElementById('bugTitle').value.trim();
  if (!title) return alert('请输入 Bug 标题');
  try {
    const resp = await fetch(API + '/predict/bug-severity', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title})
    });
    const data = await resp.json();
    if (!data.success) return alert('预测失败: '+JSON.stringify(data));
    const r = data.data;
    document.getElementById('bugResult').style.display = 'block';
    const badge = document.getElementById('bugSeverityBadge');
    badge.textContent = {fatal:'致命',serious:'严重',normal:'一般',minor:'轻微'}[r.severity] || r.severity;
    badge.className = 'badge badge-' + r.severity;
    document.getElementById('bugConfidence').textContent = Math.round(r.confidence*100)+'%';
    
    try {
      const exResp = await fetch(API + '/explain-prediction', {
        method: 'POST', headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+getToken()},
        body: JSON.stringify({title})
      });
      const ex = await exResp.json();
      document.getElementById('bugExplanation').textContent = ex.ai_explanation || `模型方法: ${r.method}`;
    } catch { document.getElementById('bugExplanation').textContent = `方法: ${r.method}`; }
  } catch(e) { alert('预测失败: '+e.message); }
}

async function predictTask() {
  const estimate = +document.getElementById('taskEstimate').value;
  const priority = document.getElementById('taskPriority').value;
  const projectId = +document.getElementById('taskProjectId').value;
  try {
    const resp = await fetch(API + '/predict/task-duration', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({estimate, priority, project_id: projectId, assigned_to: 1})
    });
    const data = await resp.json();
    if (!data.success) return alert('预测失败');
    const r = data.data;
    document.getElementById('taskResult').style.display = 'block';
    document.getElementById('predictedHours').textContent = r.predicted_hours + 'h';
    document.getElementById('taskEstimateDisplay').textContent = r.estimate_hours;
    document.getElementById('taskRange').textContent = r.range_low + 'h ~ ' + r.range_high + 'h';
    document.getElementById('taskMethod').textContent = r.method;
  } catch(e) { alert('预测失败: '+e.message); }
}

async function predictProject() {
  const pid = +document.getElementById('projectId').value;
  try {
    const resp = await fetch(API + '/predict/project-risk/' + pid);
    const data = await resp.json();
    if (!data.success) return alert('预测失败: '+JSON.stringify(data));
    const r = data.data;
    document.getElementById('projectResult').style.display = 'block';
    const rb = document.getElementById('riskBadge');
    const rk = r.risk_level;
    rb.textContent = {low:'低风险',medium:'中风险',high:'高风险',critical:'严重风险'}[rk] || rk;
    rb.className = 'badge badge-' + rk;
    document.getElementById('healthScore').textContent = r.health_score + '/100';
    document.getElementById('completionRate').textContent = r.completion_rate + '%';
    document.getElementById('bugResolveRate').textContent = r.bug_resolve_rate + '%';
    document.getElementById('projectName').textContent = '项目: ' + (r.project_name || '');
    
    const factorsDiv = document.getElementById('riskFactors');
    factorsDiv.innerHTML = '';
    (r.risk_factors||[]).forEach(f => {
      const span = document.createElement('span'); span.className = 'factor'; span.textContent = f;
      factorsDiv.appendChild(span);
    });
  } catch(e) { alert('分析失败: '+e.message); }
}

async function triggerTraining() {
  const btn = document.getElementById('trainBtn');
  btn.textContent = '训练中...'; btn.disabled = true;
  try {
    const resp = await fetch(API + '/train', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const data = await resp.json();
    btn.textContent = '重新训练模型';
    btn.disabled = false;
    if (data.success) {
      alert('训练完成! 已训练的模型: '+JSON.stringify(data.data?.models||{}));
      loadModelInfo();
    } else {
      alert('训练失败: '+JSON.stringify(data));
    }
  } catch(e) { btn.textContent='重新训练模型'; btn.disabled=false; alert('训练失败: '+e.message); }
}

function fillBug(title) {
  document.getElementById('bugTitle').value = title;
  predictBug();
}

// Init
loadModelInfo();
</script>
</body>
</html>
